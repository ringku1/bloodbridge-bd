# .github/dependabot.yml
#
# Dependabot opens automated PRs when npm dependencies have new versions or
# security advisories. Weekly cadence keeps noise low without falling far behind.
#
# Rules applied to all npm ecosystems:
#   - Major version bumps are ignored (too risky to auto-merge; handle manually)
#   - Related packages are grouped into a single PR to reduce noise

version: 2

updates:
  # ─── Backend ────────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Dhaka"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      aws-sdk:
        patterns: ["@aws-sdk/*"]
    labels:
      - "dependencies"
      - "backend"

  # ─── Mobile ─────────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Dhaka"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      expo:
        patterns: ["expo*", "@expo/*"]
      react-navigation:
        patterns: ["@react-navigation/*"]
      react-native:
        patterns: ["react-native*", "@react-native/*"]
    labels:
      - "dependencies"
      - "mobile"

  # ─── Admin dashboard ─────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/admin"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Dhaka"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      nextjs:
        patterns: ["next", "@next/*"]
    labels:
      - "dependencies"
      - "admin"

  # ─── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Dhaka"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
