# .github/workflows/deploy.yml
#
# Manual deployment to Vercel + Cloudflare Worker.
# Trigger: Actions tab → "Deploy" → Run workflow → pick what to deploy.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN              — vercel.com → Account Settings → Tokens
#   VERCEL_ORG_ID             — vercel.com → Account Settings → General → "Your ID"
#   VERCEL_BACKEND_PROJECT_ID — Vercel dashboard → backend project → Settings → General
#   VERCEL_ADMIN_PROJECT_ID   — Vercel dashboard → admin project → Settings → General
#   CLOUDFLARE_API_TOKEN      — dash.cloudflare.com → My Profile → API Tokens → Create Token
#   CLOUDFLARE_ACCOUNT_ID     — dash.cloudflare.com → right sidebar on any zone page

name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: What to deploy
        required: true
        default: backend
        type: choice
        options:
          - all
          - backend
          - admin
          - cloudflare-worker

jobs:
  # ─── Deploy backend to Vercel ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Vercel
    runs-on: ubuntu-latest
    if: inputs.target == 'backend' || inputs.target == 'all'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Vercel (production)
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}

  # ─── Deploy admin to Vercel ───────────────────────────────────────────────
  deploy-admin:
    name: Deploy Admin → Vercel
    runs-on: ubuntu-latest
    if: inputs.target == 'admin' || inputs.target == 'all'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Vercel (production)
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}

  # ─── Deploy Cloudflare Worker ─────────────────────────────────────────────
  deploy-worker:
    name: Deploy Cron Worker → Cloudflare
    runs-on: ubuntu-latest
    if: inputs.target == 'cloudflare-worker' || inputs.target == 'all'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wrangler
        working-directory: cloudflare-worker
        run: npm ci

      - name: Deploy worker
        working-directory: cloudflare-worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
