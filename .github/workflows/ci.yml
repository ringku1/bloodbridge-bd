# .github/workflows/ci.yml
#
# Runs on every push and pull request to main.
# Checks:
#   1. Backend — dependency audit, lint (if added), unit tests (if added)
#   2. Mobile  — dependency audit
#   3. Docker build validation (ensures the image compiles cleanly)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER:     testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB:       blooddonor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d blooddonor_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV:     test
      DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/blooddonor_test
      REDIS_URL:    redis://localhost:6379
      JWT_SECRET:   ci_test_secret_not_for_production_use
      ADMIN_SECRET: ci_test_admin_secret_not_for_production
      CRON_SECRET:  ci_test_cron_secret_not_for_production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Security audit (fail on high/critical)
        working-directory: backend
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true  # informational until we clear existing advisories

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run database migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Run tests
        working-directory: backend
        run: npm test --if-present

  # ─── Mobile ─────────────────────────────────────────────────────────────────
  mobile:
    name: Mobile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Security audit (fail on high/critical)
        working-directory: mobile
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

  # ─── Docker build ────────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        working-directory: backend
        run: docker build -t blood-bridge-backend:ci .
