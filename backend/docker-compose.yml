# docker-compose.yml
#
# Spins up four services:
#   1. postgres  — PostgreSQL 15 with PostGIS (for ST_DWithin radius queries)
#   2. redis     — In-memory store + AOF persistence (OTP cache + Bull job queues)
#   3. minio     — S3-compatible local storage for NID photos (dev/test only)
#   4. backend   — Express API
#
# Usage:
#   docker-compose up -d                    → start everything
#   docker-compose up -d postgres redis     → DB + Redis only (for local dev)
#   docker-compose down                     → stop all services
#   docker-compose down -v                  → stop and DELETE volumes (data loss!)

version: '3.8'

services:

  postgres:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    environment:
      POSTGRES_USER:     user
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       blooddonor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U user -d blooddonor"]
      interval: 5s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # AOF (Append-Only File) persistence: every write is fsynced to disk.
    # Survives container restarts — escalation Bull jobs are not lost.
    command: redis-server --appendonly yes --appendfilename aof.aof
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  5s
      retries:  5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    # MinIO speaks the S3 API — your AWS SDK code works with zero changes.
    # Console UI is at http://localhost:9001 (login: minioadmin / minioadmin)
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API (same port your AWS SDK points to)
      - "9001:9001"   # MinIO web console
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test:     ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout:  5s
      retries:  5

  # Creates the bucket on first start so the backend can upload immediately
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/blood-bridge-nid-photos &&
        mc anonymous set download local/blood-bridge-nid-photos
      "

  backend:
    build:
      context:    .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    # Run migrations automatically on container start, then launch the server.
    # `prisma migrate deploy` is safe to run repeatedly — it's a no-op if already up to date.
    command: >
      sh -c "npx prisma migrate deploy && npm start"

volumes:
  pgdata:
  redisdata:
  miniodata:
