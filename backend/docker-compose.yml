# docker-compose.yml
#
# Spins up four services:
#   1. postgres  — PostgreSQL 15 with PostGIS (for ST_DWithin radius queries)
#   2. redis     — Redis with AOF persistence (OTP cache)
#   3. minio     — Local S3-compatible storage for NID photos (dev only)
#   4. backend   — Express API (auto-migrates DB and creates S3 bucket on start)
#
# Usage:
#   docker-compose up -d                    → start everything
#   docker-compose up -d postgres redis     → DB + Redis only (for local dev)
#   docker-compose down                     → stop all services
#   docker-compose down -v                  → stop and DELETE all volumes (data loss!)

services:

  postgres:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    environment:
      POSTGRES_USER:     user
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       blooddonor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U user -d blooddonor"]
      interval: 5s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # AOF persistence: every write is fsynced to disk.
    # Survives container restarts — OTP keys are not lost on restart.
    command: redis-server --appendonly yes --appendfilename aof.aof
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  5s
      retries:  5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    # MinIO speaks the S3 API — the AWS SDK works with zero code changes.
    # Console UI: http://localhost:9001 (login: minioadmin / minioadmin)
    # The backend creates the bucket automatically on startup via ensureBucketExists().
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO web console
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test:     ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout:  5s
      retries:  5

  backend:
    build:
      context:    .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    # Runs DB migrations first, then starts the server.
    # ensureBucketExists() in server.js handles the MinIO bucket creation.
    command: >
      sh -c "npx prisma migrate deploy && npm start"

volumes:
  pgdata:
  redisdata:
  miniodata:
