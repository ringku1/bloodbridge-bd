# docker-compose.worker.yml
#
# Worker-only deployment for Koyeb.
# Runs Bull queue + cron jobs. No HTTP server.
#
# Use this when the API is deployed on Vercel and the worker runs on Koyeb.
# Both services share the same DATABASE_URL (Neon) and REDIS_URL (Redis Cloud).
#
# Usage on Koyeb:
#   Build: Docker (point to this repo, Dockerfile = Dockerfile.worker)
#   Start command: node src/worker.js

services:
  worker:
    build:
      context:    .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file:
      - .env.prod
