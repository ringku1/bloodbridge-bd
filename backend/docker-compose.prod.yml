# docker-compose.prod.yml
#
# Alternative production deployment — runs only the backend container on a VPS.
# The primary deployment target is Vercel (see README Production Deployment section).
#
# PostgreSQL → Neon (managed, external)
# Redis      → Redis Cloud (managed, external)
# Storage    → Backblaze B2 (S3-compatible, external)
#
# Usage (VPS):
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d  ← update

services:
  backend:
    build:
      context:    .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.prod
    healthcheck:
      test:             ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval:         30s
      timeout:          10s
      start_period:     20s
      retries:          3
